name: TezDrop APK Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: unzip TezDrop_Final.zip -d extracted

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      # Yahan humne Flutter ka purana version dala jo v1 embedding allow karega
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5' 
          channel: 'stable'
          cache: false

      - name: Clean stale build cache
        run: |
          cd extracted/final
          flutter clean
          rm -f pubspec.lock

      - name: Flutter Pub Get
        run: |
          cd extracted/final
          flutter pub get

      # Yahan hum sirf build karenge bina pipe (| tee) ke, taaki agar fail ho toh sahi pata chale
      - name: Build APK
        run: |
          cd extracted/final
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=FB_URL=${{ secrets.FB_URL }} \
            --dart-define=OTP_KEY=${{ secrets.OTP_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: TezDrop-APK
          path: extracted/final/build/app/outputs/flutter-apk/app-release.apk
