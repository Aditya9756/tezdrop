name: TezDrop APK Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract ZIP
        run: unzip tezdrop_flutter_fixed.zip -d extracted
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
      - name: Fix location_service timeLimit bug
        run: |
          sed -i '/timeLimit: Duration(seconds: 10),/d' extracted/tezdrop_fixed/lib/core/services/location_service.dart
      - name: Fix pubspec versions
        run: |
          sed -i 's/geolocator: \^10.1.0/geolocator: ^9.0.2/' extracted/tezdrop_fixed/pubspec.yaml
          sed -i 's/carousel_slider: \^4.2.1/carousel_slider: ^4.0.0/' extracted/tezdrop_fixed/pubspec.yaml
      - name: Build APK
        run: |
          cd extracted/tezdrop_fixed
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: TezDrop-APK
          path: extracted/tezdrop_fixed/build/app/outputs/flutter-apk/app-debug.apk
