name: TezDrop APK Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Extract ZIP
        run: unzip tezdrop_flutter_fixed.zip -d extracted
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - name: Build APK
        run: |
          cd extracted/tezdrop_fixed
          flutter pub get
          flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: TezDrop-APK
          path: extracted/tezdrop_fixed/build/app/outputs/flutter-apk/app-debug.apk
