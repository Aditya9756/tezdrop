name: TezDrop APK Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract ZIP
        run: unzip tezdrop_v3_fixed.zip -d extracted
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
      - name: Fix all code issues
        run: |
          cd extracted/tezdrop_fixed

          # Fix 1: location_service - replace locationSettings with desiredAccuracy
          python3 -c "
          content = open('lib/core/services/location_service.dart').read()
          content = content.replace('''return await Geolocator.getCurrentPosition(
        locationSettings: const LocationSettings(
          accuracy: LocationAccuracy.high,
          timeLimit: Duration(seconds: 10),
        ),
      );''', '''return await Geolocator.getCurrentPosition(
        desiredAccuracy: LocationAccuracy.high,
      );''')
          content = content.replace('''return await Geolocator.getCurrentPosition(
        locationSettings: const LocationSettings(
          accuracy: LocationAccuracy.high,
        ),
      );''', '''return await Geolocator.getCurrentPosition(
        desiredAccuracy: LocationAccuracy.high,
      );''')
          open('lib/core/services/location_service.dart', 'w').write(content)
          "

          # Fix 2: pubspec - downgrade geolocator and carousel
          python3 -c "
          content = open('pubspec.yaml').read()
          import re
          content = re.sub(r'geolocator:.*', 'geolocator: ^9.0.2', content)
          content = re.sub(r'carousel_slider:.*', 'carousel_slider: ^4.0.0', content)
          open('pubspec.yaml', 'w').write(content)
          "

          # Fix 3: SortChip key conflict
          python3 -c "
          content = open('lib/views/restaurants/restaurants_screen.dart').read()
          content = content.replace('final String label, key, current;', 'final String label, sortKey, current;')
          content = content.replace('const _SortChip(this.label, this.key, this.current, this.onTap);', 'const _SortChip(this.label, this.sortKey, this.current, this.onTap);')
          content = content.replace('current == key', 'current == sortKey')
          content = content.replace('onTap(key)', 'onTap(sortKey)')
          open('lib/views/restaurants/restaurants_screen.dart', 'w').write(content)
          "

      - name: Build APK
        run: |
          cd extracted/tezdrop_fixed
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: TezDrop-APK
          path: extracted/tezdrop_fixed/build/app/outputs/flutter-apk/app-debug.apk
