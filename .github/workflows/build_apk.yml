name: TezDrop APK Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP
        run: unzip TezDrop_Final.zip -d extracted

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: false

      - name: Clean stale build cache
        run: |
          cd extracted/final
          flutter clean
          rm -f pubspec.lock

      - name: Flutter Pub Get
        run: |
          cd extracted/final
          flutter pub get

      - name: Build APK
        run: |
          cd extracted/final
          flutter build apk --release --no-tree-shake-icons \
            --dart-define=FB_URL=${{ secrets.FB_URL }} \
            --dart-define=OTP_KEY=${{ secrets.OTP_KEY }}

      - uses: actions/upload-artifact@v4
        with:
          name: TezDrop-APK
          path: extracted/final/build/app/outputs/flutter-apk/app-release.apk
