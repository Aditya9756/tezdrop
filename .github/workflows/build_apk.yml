name: TezDrop APK Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract ZIP
        run: |
          unzip TezDrop_Final.zip -d extracted
          ls extracted/
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
      - name: Fix location_service
        run: |
          find extracted/ -name "location_service.dart" -exec sed -i '/timeLimit:/d' {} \;
          find extracted/ -name "location_service.dart" -exec sed -i 's/locationSettings: const LocationSettings(/desiredAccuracy:/g' {} \;
          find extracted/ -name "location_service.dart" -exec sed -i '/accuracy: LocationAccuracy.high,/{n;/^[[:space:]]*),/d}' {} \;
          find extracted/ -name "pubspec.yaml" -exec sed -i 's/geolocator: .*/geolocator: ^9.0.2/' {} \;
      - name: Build APK
        run: |
          cd extracted/final
          flutter pub get
          flutter build apk --debug --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: TezDrop-APK
          path: extracted/final/build/app/outputs/flutter-apk/app-debug.apk
